# Server Configuration
server.port=8086

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/build360_employee_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Configuration (Framework-Compatible)
security.jwt.secret=your_super_secret_key_which_should_be_long_enough_for_hs256_algorithm
security.jwt.access-token-expiration=86400000
security.jwt.refresh-token-expiration=604800000
security.jwt.header-name=Authorization
security.jwt.token-prefix=Bearer 

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# File Upload
file.upload-dir=catconDocs
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Encryption (for LeadPost ID encryption)
app.encryption.secret=catcon_key_32_chars_long_secret_

# SMTP Configuration
