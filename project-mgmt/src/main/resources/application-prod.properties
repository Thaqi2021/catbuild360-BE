# Server Configuration
server.port=8088

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/build360_project_db?createDatabaseIfNotExist=true&useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Configuration (Framework-Compatible)
security.jwt.secret=${JWT_SECRET}
security.jwt.access-token-expiration=86400000
security.jwt.refresh-token-expiration=604800000
security.jwt.header-name=Authorization
security.jwt.token-prefix=Bearer

# CORS
app.cors.allowed-origins=https://www.catengineers.com,http://localhost:5174

# File Upload
file.upload-dir=catconDocs
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Encryption (for LeadPost ID encryption)
app.encryption.secret=${ENCRYPTION_SECRET}

# SMTP Configuration
spring.mail.host=smtp.hostinger.com
spring.mail.port=465
spring.mail.username=${SMTP_USERNAME:admin@catengineers.com}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000

